<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS RIGOR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; background: #000; color: #0f0; font-family: monospace; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; }
        #painel { position: absolute; bottom: 10px; left: 10px; z-index: 1000; background: rgba(0,20,0,0.9); border: 2px solid #0f0; padding: 10px; width: 260px; }
        #gaveta { position: absolute; bottom: 0; width: 100%; background: #000; border-top: 2px solid #0f0; padding: 15px; transform: translateY(100%); transition: 0.3s; z-index: 2000; }
        #gaveta.aberta { transform: translateY(0); }
        .btn { background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 5px; }
        #aviso { display:none; position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: red; color: white; padding: 20px; z-index: 9999; border: 4px solid white; font-size: 24px; text-align: center; }
    </style>
</head>
<body>
    <div id="aviso">🚨 ALVO A <span id="dt"></span>m 🚨</div>
    <div id="map"></div>
    <div id="painel">
        <button class="btn" id="btnLigar" onclick="iniciar()">⚡ LIGAR GPS</button>
        <div id="coords">LAT: ---<br>LON: ---</div>
        <div style="border: 1px dashed #0f0; font-size: 10px; padding: 3px; margin: 5px 0;">100 METROS FIXO</div>
        <button class="btn" onclick="document.getElementById('gaveta').classList.add('aberta')">▲ MENU / MARCAS</button>
    </div>
    <div id="gaveta">
        <button class="btn" style="background:#400;" onclick="marcar()">🔴 MARCAR</button>
        <button class="btn" onclick="document.getElementById('gpx').click()">📥 IMPORTAR</button>
        <button class="btn" style="color: #8af;" onclick="exportar()">📤 EXPORTAR</button>
        <button class="btn" onclick="apagar()" style="color:red;">🗑️ APAGAR TUDO</button>
        <button class="btn" onclick="document.getElementById('gaveta').classList.remove('aberta')">✖ FECHAR</button>
        <input type="file" id="gpx" style="display:none" onchange="ler(this)">
    </div>
    <script>
        let mapa, barco, camada, la, lo, pts = {};
        try { pts = JSON.parse(localStorage.getItem('pts_aorus')) || {}; } catch(e) {}
        mapa = L.map('map', { center: [37.1, -8.6], zoom: 15, zoomControl: false, attributionControl: false });
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(mapa);
        camada = L.layerGroup().addTo(mapa);
        function desenhar() {
            camada.clearLayers();
            Object.values(pts).forEach(p => L.marker([p.lat, p.lon], { icon: L.divIcon({ html: `<div style="font-size:20px;">${p.s}</div>`, className: '' }) }).addTo(camada));
        }
        function marcar() { if(!la) return; pts['P'+Date.now()] = { lat: la, lon: lo, s: '🔴' }; localStorage.setItem('pts_aorus', JSON.stringify(pts)); desenhar(); }
        function iniciar() {
            document.getElementById('btnLigar').style.display = 'none';
            navigator.geolocation.watchPosition(pos => {
                la = pos.coords.latitude; lo = pos.coords.longitude;
                document.getElementById('coords').innerHTML = `LAT: ${la.toFixed(5)}<br>LON: ${lo.toFixed(5)}`;
                let menor = Infinity;
                Object.values(pts).forEach(p => { let d = mapa.distance([la, lo], [p.lat, p.lon]); if(d < menor) menor = d; });
                document.getElementById('aviso').style.display = menor <= 100 ? 'block' : 'none';
                document.getElementById('dt').textContent = Math.round(menor);
                if(!barco) { barco = L.marker([la, lo]).addTo(mapa); mapa.setView([la, lo], 17); } else { barco.setLatLng([la, lo]); }
                mapa.panTo([la, lo]);
            }, null, { enableHighAccuracy: true });
            desenhar();
        }
        function exportar() {
            let g = '<?xml version="1.0"?><gpx version="1.1">';
            Object.values(pts).forEach(p => g += `<wpt lat="${p.lat}" lon="${p.lon}"></wpt>`);
            g += '</gpx>';
            let l = document.createElement('a'); l.href = URL.createObjectURL(new Blob([g])); l.download = 'marcas.gpx'; l.click();
        }
        function ler(i) {
            let r = new FileReader(); r.onload = (e) => {
                let x = new DOMParser().parseFromString(e.target.result, "text/xml");
                let w = x.getElementsByTagName('wpt');
                for(let j=0; j<w.length; j++) pts['I'+Date.now()+j] = { lat: parseFloat(w[j].getAttribute('lat')), lon: parseFloat(w[j].getAttribute('lon')), s: '📍' };
                localStorage.setItem('pts_aorus', JSON.stringify(pts)); desenhar(); alert("OK");
            }; r.readAsText(i.files[0]);
        }
        function apagar() { if(confirm("Apagar?")) { pts = {}; localStorage.setItem('pts_aorus', "{}"); desenhar(); } }
    </script>
</body>
</html>

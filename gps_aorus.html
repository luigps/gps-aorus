<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - COMANDO SEGURO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; padding: 0; background: black; color: white; font-family: Arial; overflow: hidden; }
        #mapa { width: 100vw; height: 100vh; background-image: url('CartaLagos.png'); background-size: cover; background-position: center; position: absolute; z-index: 1; }
        
        #painel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.9); padding: 12px; border: 2px solid red; z-index: 100; width: 200px; border-radius: 10px; }
        #dados { color: #00FF00; font-family: monospace; font-size: 16px; margin-bottom: 10px; }
        
        /* BOTÕES GRANDES PARA O MAR */
        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 15px; font-weight: bold; border-radius: 8px; border: 1px solid white; font-size: 14px; }
        .btn-principal { background: red; color: white; grid-column: span 2; font-size: 18px; }
        .btn-pt { background: #333; color: white; }
        #btnLigar { background: green; width: 100%; font-size: 20px; margin-bottom: 10px; }
        #btnLimpar { background: #111; color: #555; width: 100%; margin-top: 15px; border: none; font-size: 10px; }

        #bussola { position: absolute; bottom: 30px; right: 20px; width: 80px; height: 80px; border: 3px solid white; border-radius: 50%; background: rgba(0,0,0,0.7); z-index: 100; }
        #agulha { position: absolute; top: 10px; left: 38px; width: 4px; height: 35px; background: red; transform-origin: bottom; }
        
        .ponto-marcado { position: absolute; font-size: 30px; z-index: 40; transform: translate(-50%, -50%); pointer-events: none; }
        #barco { position: absolute; width: 20px; height: 20px; background: yellow; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); z-index: 50; display: none; transform: translate(-50%, -50%); border: 1px solid black; }
    </style>
</head>
<body>

<div id="mapa"><div id="barco"></div></div>

<div id="painel">
    <button id="btnLigar" onclick="iniciar()">LIGAR GPS</button>
    <div id="dados">
        VEL: <span id="vel" style="color:yellow; font-size:22px;">0.0</span> kn<br>
        DIST: <span id="dist" style="color:cyan">---</span> m
    </div>
    
    <div class="grid-botoes">
        <button class="btn-principal" onclick="registar(0)">MARCA FIXA ⚓</button>
        <button class="btn-pt" onclick="registar(1)">P1</button>
        <button class="btn-pt" onclick="registar(2)">P2</button>
        <button class="btn-pt" onclick="registar(3)">P3</button>
        <button class="btn-pt" onclick="registar(4)">P4</button>
    </div>
    <button id="btnLimpar" onclick="limpar()">APAGAR TUDO</button>
</div>

<div id="bussola"><div id="agulha"></div></div>

<script>
    let pontosSalvos = JSON.parse(localStorage.getItem('pontosAorus')) || {};
    let minhaPos = { x: window.innerWidth/2, y: window.innerHeight/2 };

    function iniciar() {
        document.getElementById('btnLigar').style.display = 'none';
        navigator.geolocation.watchPosition(pos => {
            const speed = pos.coords.speed ? (pos.coords.speed * 1.94384).toFixed(1) : "0.0";
            document.getElementById('vel').innerText = speed;
            
            const b = document.getElementById('barco');
            b.style.display = 'block';
            b.style.left = minhaPos.x + "px";
            b.style.top = minhaPos.y + "px";
            
            if (pos.coords.heading) document.getElementById('agulha').style.transform = `rotate(${pos.coords.heading}deg)`;
            atualizarDistancia();
        }, null, { enableHighAccuracy: true });

        desenharPontos();
    }

    function registar(id) {
        // Guarda o ponto exatamente onde o barco está no momento
        pontosSalvos[id] = { x: minhaPos.x, y: minhaPos.y, t: id === 0 ? "⚓" : "📍" };
        localStorage.setItem('pontosAorus', JSON.stringify(pontosSalvos));
        desenharPontos();
        atualizarDistancia();
    }

    function desenharPontos() {
        // Limpa desenhos antigos antes de redesenhar
        document.querySelectorAll('.ponto-marcado').forEach(p => p.remove());
        Object.values(pontosSalvos).forEach(p => {
            let div = document.createElement('div');
            div.className = 'ponto-marcado';
            div.style.left = p.x + "px";
            div.style.top = p.y + "px";
            div.innerText = p.t;
            document.getElementById('mapa').appendChild(div);
        });
    }

    function atualizarDistancia() {
        if (pontosSalvos[0]) {
            let d = Math.sqrt(Math.pow(pontosSalvos[0].x - minhaPos.x, 2) + Math.pow(pontosSalvos[0].y - minhaPos.y, 2));
            document.getElementById('dist').innerText = Math.round(d);
        }
    }

    function limpar() {
        if(confirm("Comandante, limpar todas as marcas?")) {
            localStorage.removeItem('pontosAorus');
            location.reload();
        }
    }
</script>
</body>
</html>

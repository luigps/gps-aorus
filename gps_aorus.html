<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - OPEN SOURCE SAT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { touch-action: none; -webkit-user-select: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        /* QUADRADO VERDE - O SEU COMANDO */
        #painel { 
            position: absolute; bottom: 25px; left: 15px; 
            background: rgba(0,25,0,0.9); padding: 15px; 
            border: 3px solid #00FF00; z-index: 1000; 
            width: 240px; border-radius: 10px; color: #00FF00;
            font-family: 'Courier New', monospace; box-shadow: 0 0 15px black;
        }
        
        #dados { font-size: 16px; font-weight: bold; line-height: 1.8; }
        .vel-destaque { color: yellow; font-size: 22px; }
        
        #btnLigar { 
            background: #006600; color: white; width: 100%; padding: 15px; 
            margin-bottom: 10px; border: 2px solid #00FF00; border-radius: 8px;
            font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* BARCO AMARELO CUSTOMIZADO */
        .icon-barco {
            width: 0; height: 0; 
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 25px solid yellow;
            filter: drop-shadow(0 0 5px black);
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="painel">
    <button id="btnLigar" onclick="ativarNavegacao()">LIGAR RADAR AORUS</button>
    <div id="dados">
        LAT: <span id="txtLat">00°00.0000</span><br>
        LON: <span id="txtLon">000°00.0000</span><br>
        VEL: <span id="vel" class="vel-destaque">0.0</span> kn<br>
        RUMO: <span id="rumo" style="color:cyan;">000</span>°
    </div>
</div>

<script>
    let mapa, marcadorBarco;
    
    // CONFIGURAÇÃO DO MAPA (CENTRO EM LAGOS)
    mapa = L.map('map', {
        center: [37.1000, -8.6700],
        zoom: 13,
        zoomControl: false, // Tirar os botões para não estorvar
        attributionControl: false
    });

    // CAMADA DE SATÉLITE (ESRI OPEN SOURCE)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19
    }).addTo(mapa);

    // FORMATO EXIGIDO: 37°06.2255
    function formatar(valor, isLat) {
        let absV = Math.abs(valor);
        let g = Math.floor(absV);
        let m = ((absV - g) * 60).toFixed(4);
        let p = isLat ? "" : (g < 100 ? (g < 10 ? "00" : "0") : "");
        return `${p}${g}°${m}`;
    }

    async function ativarNavegacao() {
        document.getElementById('btnLigar').style.display = 'none';
        
        // Bloquear desligamento do ecrã
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');

        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const vel = (pos.coords.speed * 1.94384 || 0).toFixed(1);
            const rumo = Math.round(pos.coords.heading || 0);

            // ATUALIZAR QUADRADO VERDE
            document.getElementById('txtLat').textContent = formatar(lat, true);
            document.getElementById('txtLon').textContent = formatar(lon, false);
            document.getElementById('vel').textContent = vel;
            document.getElementById('rumo').textContent = rumo.toString().padStart(3, '0');

            // POSICIONAR O BARCO NO MAPA REAL
            const novaPos = [lat, lon];
            
            if (!marcadorBarco) {
                const barcoIcon = L.divIcon({ className: 'icon-barco', iconSize: [24, 25], iconAnchor: [12, 12] });
                marcadorBarco = L.marker(novaPos, { icon: barcoIcon }).addTo(mapa);
                mapa.setView(novaPos, 16);
            } else {
                marcadorBarco.setLatLng(novaPos);
            }

            // RODAR O BARCO SE HOUVER RUMO
            if (rumo) {
                document.querySelector('.icon-barco').style.transform = `rotate(${rumo}deg)`;
            }

        }, (err) => { alert("Erro de sinal: " + err.message); }, 
        { enableHighAccuracy: true, maximumAge: 0 });
    }

    // MOSTRA COORDENADA DE ONDE TOCA (NO QUADRADO)
    mapa.on('click', function(e) {
        document.getElementById('txtLat').textContent = formatar(e.latlng.lat, true);
        document.getElementById('txtLon').textContent = formatar(e.latlng.lng, false);
    });

</script>
</body>
</html>

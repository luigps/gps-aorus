<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - RIGOR TOTAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        * { touch-action: none; -webkit-user-select: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #001220; color: white; font-family: Arial; overflow: hidden; }
        #cenario { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #mapa-real { position: absolute; width: 15000px; height: 5000px; transform-origin: 0 0; z-index: 1; }
        #costa-svg { width: 100%; height: 100%; }
        #barco { position: absolute; width: 26px; height: 26px; background: yellow; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); z-index: 100; display: none; transform: translate(-50%, -50%); border: 2px solid black; box-shadow: 0 0 15px yellow; }
        
        /* QUADRADO VERDE (GPS REAL) */
        #painel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.95); padding: 10px; border: 2px solid red; z-index: 200; width: 190px; border-radius: 10px; }
        #dados { color: #00FF00; font-family: monospace; font-size: 13px; margin-bottom: 8px; }
        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { font-weight: bold; border-radius: 6px; cursor: pointer; border: 1px solid white; padding: 8px; }
        .btn-principal { background: #ff0000; color: white; grid-column: span 2; padding: 12px; }
        #btnLigar { background: green; color: white; width: 100%; padding: 12px; margin-bottom: 8px; font-size: 16px; border: none; }
        #btnApagar { position: absolute; top: 5px; right: 5px; background: #222; width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; color: white; }

        /* VISOR DE TOQUE (INSPEÇÃO) */
        #cursor-visor { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 8px 15px; border-radius: 20px; border: 1px solid cyan; font-family: monospace; font-size: 14px; color: cyan; z-index: 300; pointer-events: none; min-width: 280px; text-align: center; }

        #bussola { position: absolute; bottom: 10px; right: 10px; width: 70px; height: 70px; border: 2px solid white; border-radius: 50%; background: rgba(0,0,0,0.7); z-index: 200; }
        #agulha { position: absolute; top: 8px; left: 33px; width: 4px; height: 25px; background: red; transform-origin: bottom; transition: transform 0.2s; }
        .nome-local { fill: white; font-size: 60px; font-weight: bold; text-shadow: 3px 3px black; }
        .ponto-marcado { position: absolute; width: 16px; height: 16px; border-radius: 50%; border: 2px solid white; transform: translate(-50%, -50%); z-index: 50; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="cursor-visor">TOQUE NO MAPA PARA COORDENADAS</div>

<div id="cenario">
    <div id="mapa-real">
        <svg id="costa-svg" viewBox="0 0 15000 5000">
            <path d="M0,0 L15000,0 L15000,1500 L13000,1550 L11000,1600 L9000,1700 L7000,1650 L5500,1550 L4200,1500 L3200,1600 L2850,1950 L2500,1850 L1000,1750 L0,1800 Z" fill="#5c3a21" stroke="#d2b48c" stroke-width="20" />
            <text x="500" y="1700" class="nome-local">SAGRES</text>
            <text x="1300" y="1650" class="nome-local">BURGAU</text>
            <text x="2000" y="1750" class="nome-local">LUZ</text>
            <text x="2500" y="1800" class="nome-local">P. MÓS</text>
            <text x="2850" y="1850" class="nome-local">LAGOS</text>
            <text x="5000" y="1450" class="nome-local">PORTIMÃO</text>
            <text x="14000" y="1400" class="nome-local">VRSA</text>
        </svg>
        <div id="barco"></div>
    </div>
</div>

<div id="painel">
    <button id="btnApagar" onclick="limparPontos()">🗑️</button>
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR SISTEMA</button>
    <div id="dados">
        LAT: <span id="lat">---</span><br>
        LON: <span id="lon">---</span><br>
        VEL: <span id="vel" style="color:yellow; font-size:18px;">0.0</span> kn<br>
        RUMO: <span id="rumo" style="color:cyan;">0</span>°
    </div>
    <div class="grid-botoes">
        <button class="btn-principal" onclick="marcar(0)">MARCA 🔴</button>
        <button onclick="marcar(1)">P1</button>
        <button onclick="marcar(2)">P2</button>
        <button onclick="marcar(3)">P3</button>
        <button onclick="marcar(4)">P4</button>
    </div>
</div>

<div id="bussola"><div id="agulha"></div></div>

<script>
    let pontos = JSON.parse(localStorage.getItem('pontosAorus')) || {};
    let zoom = 0.3, mapX = 0, mapY = 0;
    let barcoPos = { x: 2850, y: 2500 }; 
    let evCache = []; let prevDiff = -1;
    let isDragging = false, lastX, lastY;

    const lonO = -9.0000, lonE = -7.3000, latN = 37.3000, latS = 36.6000;

    const mapa = document.getElementById('mapa-real');
    const cenario = document.getElementById('cenario');
    const visor = document.getElementById('cursor-visor');

    async function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');

        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude; 
            const lon = pos.coords.longitude;
            
            // ATUALIZAÇÃO FORÇADA DO QUADRADO VERDE
            document.getElementById('lat').textContent = lat.toFixed(4);
            document.getElementById('lon').textContent = lon.toFixed(4);
            document.getElementById('vel').textContent = (pos.coords.speed * 1.94 || 0).toFixed(1);
            document.getElementById('rumo').textContent = Math.round(pos.coords.heading || 0);

            barcoPos.x = ((lon - lonO) / (lonE - lonO)) * 15000;
            barcoPos.y = ((latN - lat) / (latN - latS)) * 5000;

            const b = document.getElementById('barco');
            b.style.display = 'block'; 
            b.style.left = barcoPos.x + "px"; 
            b.style.top = barcoPos.y + "px";
            
            if (pos.coords.heading) document.getElementById('agulha').style.transform = `rotate(${pos.coords.heading}deg)`;
        }, (err) => { alert("Erro GPS: " + err.message); }, { enableHighAccuracy: true, maximumAge: 0 });

        centrarNoBarco();
        desenhar();
    }

    // LEITURA POR TOQUE (VISOR AZUL)
    cenario.onpointermove = e => {
        // Coordenadas do toque
        let rect = cenario.getBoundingClientRect();
        let xM = (e.clientX - mapX) / zoom; 
        let yM = (e.clientY - mapY) / zoom;
        let cLon = (xM / 15000) * (lonE - lonO) + lonO;
        let cLat = latN - (yM / 5000) * (latN - latS);
        
        visor.textContent = `INSPEÇÃO -> LAT: ${cLat.toFixed(4)} | LON: ${cLon.toFixed(4)}`;

        const index = evCache.findIndex(s => s.pointerId === e.pointerId);
        evCache[index] = e;

        if (evCache.length === 2) {
            isDragging = false;
            const curDiff = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            if (prevDiff > 0) {
                const fator = curDiff > prevDiff ? 1.015 : 0.985;
                const midX = (evCache[0].clientX + evCache[1].clientX) / 2;
                const midY = (evCache[0].clientY + evCache[1].clientY) / 2;
                const oldZoom = zoom;
                zoom *= fator;
                if(zoom < 0.05) zoom = 0.05; if(zoom > 10) zoom = 10;
                mapX = midX - (midX - mapX) * zoom / oldZoom;
                mapY = midY - (midY - mapY) * zoom / oldZoom;
            }
            prevDiff = curDiff;
        } else if (isDragging) {
            mapX += e.clientX - lastX; 
            mapY += e.clientY - lastY;
            lastX = e.clientX; 
            lastY = e.clientY;
        }
        atualizarTransform();
    };

    cenario.onpointerdown = e => { 
        evCache.push(e); 
        isDragging = true; 
        lastX = e.clientX; 
        lastY = e.clientY; 
    };
    
    cenario.onpointerup = e => { 
        isDragging = false; 
        evCache = evCache.filter(p => p.pointerId !== e.pointerId); 
        prevDiff = -1; 
    };

    function centrarNoBarco() {
        mapX = (window.innerWidth / 2) - (barcoPos.x * zoom);
        mapY = (window.innerHeight / 2) - (barcoPos.y * zoom);
        atualizarTransform();
    }

    function atualizarTransform() { 
        mapa.style.transform = `translate(${mapX}px, ${mapY}px) scale(${zoom})`; 
    }
    
    function marcar(id) { 
        pontos[id] = { x: barcoPos.x, y: barcoPos.y }; 
        localStorage.setItem('pontosAorus', JSON.stringify(pontos)); 
        desenhar(); 
    }
    
    function desenhar() {
        document.querySelectorAll('.ponto-marcado').forEach(p => p.remove());
        Object.keys(pontos).forEach(id => {
            let div = document.createElement('div');
            div.className = 'ponto-marcado';
            div.style.background = id == 0 ? "red" : "white";
            div.style.left = pontos[id].x + "px"; 
            div.style.top = pontos[id].y + "px";
            mapa.appendChild(div);
        });
    }

    function limparPontos() { 
        if(confirm("Limpar marcas?")) { 
            pontos = {}; 
            localStorage.removeItem('pontosAorus'); 
            desenhar(); 
        } 
    }
</script>
</body>
</html>

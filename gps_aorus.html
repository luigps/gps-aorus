<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - RIGOR TOTAL</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { touch-action: none; -webkit-user-select: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
        
        #map-container { width: 100vw; height: 100vh; perspective: 1100px; overflow: hidden; position: absolute; top: 0; left: 0; z-index: 1; }
        #map { width: 165%; height: 175%; left: -32.5%; top: -40%; position: absolute; transition: transform 0.6s ease-out; }
        .vista-3d { transform: rotateX(52deg) translateY(18%) scale(1.15); }

        #btnVista { position: absolute; top: 15px; right: 15px; z-index: 2000; background: #111; color: #00FF00; border: 2px solid #00FF00; padding: 12px; font-weight: bold; border-radius: 8px; }

        #painel { 
            position: absolute; bottom: 15px; left: 10px; 
            background: rgba(0,20,0,0.95); padding: 12px; 
            border: 3px solid #00FF00; z-index: 1000; 
            width: 280px; border-radius: 10px; color: #00FF00;
            font-family: 'Courier New', monospace; box-shadow: 0 0 30px black;
        }
        #dados { font-size: 14px; font-weight: bold; line-height: 1.6; margin-bottom: 5px; }
        #btnLigar { background: #004400; color: white; width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #00FF00; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .grid-marcas { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn-m { background: #1a1a1a; color: #00FF00; border: 1px solid #00FF00; padding: 15px 5px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-vermelho { background: #900 !important; color: white !important; grid-column: span 2; }
        .btn-f { grid-column: span 2; font-size: 11px; background: #333; height: 35px; margin-top: 5px; }

        .seta-barco { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 26px solid yellow; }
    </style>
</head>
<body>

<button id="btnVista" onclick="alternarVista()">VISTA: CARTA 2D</button>
<input type="file" id="f_gpx" style="display:none" accept=".gpx" onchange="lerGPX(this)">

<div id="map-container"><div id="map"></div></div>

<div id="painel">
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR GPS AORUS</button>
    <div id="dados">
        LAT: <span id="txtLat">37°00.0000</span><br>
        LON: <span id="txtLon">008°00.0000</span><br>
        VEL: <span id="vel" style="color:yellow;">0.0</span> kn
    </div>
    <div class="grid-marcas">
        <button class="btn-m btn-vermelho" onclick="marcar('barco')">MARCA BARCO 🔴</button>
        <button class="btn-m" onclick="marcar('ancora')"><svg width="20" height="20" viewBox="0 0 24 24" fill="red"><path d="M12 2c.55 0 1 .45 1 1v1.1c1.72.45 3 2.01 3 3.9h-2c0-1.1-.9-2-2-2s-2 .9-2 2h-2c0-1.89 1.28-3.45 3-3.9V3c0-.55.45-1 1-1zm8 11h-2c0 2.21-1.79 4-4 4s-4-1.79-4-4h-2c0 3.31 2.69 6 6 6s6-2.69 6-6zM12 11c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>ÂNCORA</button>
        <button class="btn-m" onclick="marcar('amarela')"><div style="width:15px; height:15px; background:yellow; border-radius:50%; border:1px solid white;"></div>AMARELA</button>
        <button class="btn-m" style="grid-column: span 2;" onclick="marcar('vermelha')"><div style="width:15px; height:15px; background:red; border-radius:50%; border:1px solid white;"></div>VERMELHA</button>
        
        <button class="btn-m btn-f" style="background:#003366 !important; color:#00FFFF !important;" onclick="document.getElementById('f_gpx').click()">📥 IMPORTAR CARTÃO</button>
        <button class="btn-m btn-f" onclick="exportarELimpar()">📤 EXPORTAR E LIMPAR</button>
    </div>
</div>

<script>
    let mapa, barco, camada, wakeLock = null;
    let latA, lonA, modo3D = false;
    let pontos = JSON.parse(localStorage.getItem('ptsAorus')) || {};

    mapa = L.map('map', { center: [37.1000, -8.6700], zoom: 14, zoomControl: false, attributionControl: false });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(mapa);
    camada = L.layerGroup().addTo(mapa);

    // FUNÇÃO QUE DESENHA OS ÍCONES SEM USAR EMOJIS (BLINDAGEM)
    function obterIcone(tipo) {
        let html = '';
        if (tipo === 'ancora') {
            html = '<svg width="25" height="25" viewBox="0 0 24 24" fill="red" style="filter:drop-shadow(2px 2px 2px black);"><path d="M12 2c.55 0 1 .45 1 1v1.1c1.72.45 3 2.01 3 3.9h-2c0-1.1-.9-2-2-2s-2 .9-2 2h-2c0-1.89 1.28-3.45 3-3.9V3c0-.55.45-1 1-1zm8 11h-2c0 2.21-1.79 4-4 4s-4-1.79-4-4h-2c0 3.31 2.69 6 6 6s6-2.69 6-6z"/></svg>';
        } else if (tipo === 'amarela') {
            html = '<div style="width:16px; height:16px; background:yellow; border:2px solid white; border-radius:50%; box-shadow: 2px 2px 5px black;"></div>';
        } else if (tipo === 'vermelha' || tipo === 'barco') {
            html = '<div style="width:16px; height:16px; background:red; border:2px solid white; border-radius:50%; box-shadow: 2px 2px 5px black;"></div>';
        }
        return L.divIcon({ html: html, className: 'custom-m', iconSize: [20, 20], iconAnchor: [10, 10] });
    }

    function desenhar() {
        camada.clearLayers();
        Object.keys(pontos).forEach(id => {
            L.marker([pontos[id].lat, pontos[id].lon], { icon: obterIcone(pontos[id].tipo) }).addTo(camada);
        });
    }

    function marcar(tipo) {
        if (!latA) return;
        pontos["PT_"+Date.now()] = { lat: latA, lon: lonA, tipo: tipo };
        localStorage.setItem('ptsAorus', JSON.stringify(pontos));
        desenhar();
    }

    function lerGPX(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const parser = new DOMParser();
            const xml = parser.parseFromString(reader.result, "text/xml");
            const wpts = xml.getElementsByTagName("wpt");
            for (let i = 0; i < wpts.length; i++) {
                let lt = parseFloat(wpts[i].getAttribute("lat"));
                let ln = parseFloat(wpts[i].getAttribute("lon"));
                pontos["IMP_"+Date.now()+"_"+i] = { lat: lt, lon: ln, tipo: 'vermelha' };
            }
            localStorage.setItem('ptsAorus', JSON.stringify(pontos));
            desenhar();
            alert(wpts.length + " marcas importadas!");
        };
        reader.readAsText(input.files[0]);
    }

    function exportarELimpar() {
        let gpx = '<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="GPS_Aorus">';
        Object.keys(pontos).forEach(id => {
            gpx += `\n  <wpt lat="${pontos[id].lat}" lon="${pontos[id].lon}"><name>${pontos[id].tipo}</name></wpt>`;
        });
        gpx += '\n</gpx>';
        const blob = new Blob([gpx], { type: 'text/xml' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'MARCAS_AORUS.gpx'; a.click();
        pontos = {}; localStorage.removeItem('ptsAorus'); desenhar();
    }

    function alternarVista() {
        modo3D = !modo3D;
        document.getElementById('map').classList.toggle('vista-3d', modo3D);
        document.getElementById('btnVista').textContent = modo3D ? "VISTA: MAR 3D" : "VISTA: CARTA 2D";
    }

    function formatar(v, isLat) {
        let a = Math.abs(v); let g = Math.floor(a); let m = ((a - g) * 60).toFixed(4);
        return `${!isLat && g < 100 ? (g < 10 ? "00" : "0") : ""}${g}°${m}`;
    }

    async function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        navigator.geolocation.watchPosition(pos => {
            latA = pos.coords.latitude; lonA = pos.coords.longitude;
            document.getElementById('txtLat').textContent = formatar(latA, true);
            document.getElementById('txtLon').textContent = formatar(lonA, false);
            document.getElementById('vel').textContent = (pos.coords.speed * 1.94 || 0).toFixed(1);
            if (!barco) {
                barco = L.marker([latA, lonA], { icon: L.divIcon({className:'seta-barco', iconAnchor:[10,13]}) }).addTo(mapa);
                mapa.setView([latA, lonA], 16);
            } else { barco.setLatLng([latA, lonA]); }
        }, null, { enableHighAccuracy: true });
        desenhar();
    }

    mapa.on('click', e => {
        document.getElementById('txtLat').textContent = formatar(e.latlng.lat, true);
        document.getElementById('txtLon').textContent = formatar(e.latlng.lng, false);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - CONTROLO DE VISTA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { touch-action: none; -webkit-user-select: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { width: 100vw; height: 100vh; z-index: 1; transition: all 0.5s; }
        
        /* BOTÃO DE VISTA (PLANA/3D) */
        #btnVista { 
            position: absolute; top: 15px; right: 15px; z-index: 2000;
            background: #222; color: white; border: 2px solid #00FF00;
            padding: 15px; font-weight: bold; border-radius: 50%;
            width: 60px; height: 60px; cursor: pointer; font-size: 14px;
        }

        /* PAINEL GPS AORUS */
        #painel { 
            position: absolute; bottom: 20px; left: 10px; 
            background: rgba(0,20,0,0.95); padding: 15px; 
            border: 3px solid #00FF00; z-index: 1000; 
            width: 250px; border-radius: 10px; color: #00FF00;
            font-family: 'Courier New', monospace;
        }
        #dados { font-size: 16px; font-weight: bold; line-height: 1.8; margin-bottom: 10px; }
        #btnLigar { background: #004400; color: white; width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #00FF00; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-marca { background: #1a1a1a; color: #00FF00; border: 1px solid #00FF00; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-vermelho { background: #900 !important; color: white !important; grid-column: span 2; }

        /* ESTILO PARA A INCLINAÇÃO (EFEITO 3D) */
        .mapa-3d { transform: perspective(600px) rotateX(30deg); }

        .seta-barco {
            width: 0; height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 22px solid yellow;
        }
    </style>
</head>
<body>

<button id="btnVista" onclick="alternarVista()">2D</button>

<div id="map"></div>

<div id="painel">
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR GPS AORUS</button>
    <div id="dados">
        LAT: <span id="txtLat">37°00.0000</span><br>
        LON: <span id="txtLon">008°00.0000</span><br>
        VEL: <span id="vel" style="color:yellow;">0.0</span> kn
    </div>
    <div class="grid-botoes">
        <button class="btn-marca btn-vermelho" onclick="gravarPonto(0)">MARCA🔴 (RECIFE)</button>
        <button class="btn-marca" onclick="gravarPonto(1)">P1</button>
        <button class="btn-marca" onclick="gravarPonto(2)">P2</button>
    </div>
</div>

<script>
    let mapa, barco, camadaMarcas;
    let latAtual, lonAtual;
    let vista3D = false;
    let memoriaMarcas = JSON.parse(localStorage.getItem('marcasAorus')) || {};

    mapa = L.map('map', { center: [37.1000, -8.6700], zoom: 15, zoomControl: false, attributionControl: false });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(mapa);
    camadaMarcas = L.layerGroup().addTo(mapa);

    function alternarVista() {
        vista3D = !vista3D;
        const btn = document.getElementById('btnVista');
        const mapDiv = document.getElementById('map');
        
        if (vista3D) {
            mapDiv.classList.add('mapa-3d');
            btn.textContent = "3D";
            btn.style.background = "#00FF00";
            btn.style.color = "black";
        } else {
            mapDiv.classList.remove('mapa-3d');
            btn.textContent = "2D";
            btn.style.background = "#222";
            btn.style.color = "white";
        }
    }

    function formatar(v, isLat) {
        let a = Math.abs(v);
        let g = Math.floor(a);
        let m = ((a - g) * 60).toFixed(4);
        let p = isLat ? "" : (g < 100 ? (g < 10 ? "00" : "0") : "");
        return `${p}${g}°${m}`;
    }

    async function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        navigator.geolocation.watchPosition(pos => {
            latAtual = pos.coords.latitude;
            lonAtual = pos.coords.longitude;
            document.getElementById('txtLat').textContent = formatar(latAtual, true);
            document.getElementById('txtLon').textContent = formatar(lonAtual, false);
            document.getElementById('vel').textContent = (pos.coords.speed * 1.94 || 0).toFixed(1);

            if (!barco) {
                barco = L.marker([latAtual, lonAtual], { icon: L.divIcon({className:'seta-barco'}) }).addTo(mapa);
                mapa.setView([latAtual, lonAtual], 17);
            } else {
                barco.setLatLng([latAtual, lonAtual]);
            }
        }, null, { enableHighAccuracy: true });
        desenharMarcas();
    }

    function gravarPonto(id) {
        if (!latAtual) return;
        memoriaMarcas[id] = { lat: latAtual, lon: lonAtual };
        localStorage.setItem('marcasAorus', JSON.stringify(memoriaMarcas));
        desenharMarcas();
    }

    function desenharMarcas() {
        camadaMarcas.clearLayers();
        Object.keys(memoriaMarcas).forEach(id => {
            let pt = memoriaMarcas[id];
            L.circleMarker([pt.lat, pt.lon], {radius: 7, color: 'white', weight: 2, fillColor: 'red', fillOpacity: 1}).addTo(camadaMarcas);
        });
    }

    mapa.on('click', e => {
        document.getElementById('txtLat').textContent = formatar(e.latlng.lat, true);
        document.getElementById('txtLon').textContent = formatar(e.latlng.lng, false);
    });
</script>
</body>
</html>

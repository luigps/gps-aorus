<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - CARTA CARTOGRÁFICA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; padding: 0; background: #001f3f; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        
        /* O CONTENTOR DA CARTA (OCUPA TUDO) */
        #contentor-mapa { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        /* O DESENHO VETORIAL DA COSTA (SVG) */
        #svg-mapa {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
        }

        /* NOMES DOS LOCAIS */
        .local { position: absolute; color: white; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; transform: translate(-50%, -100%); z-index: 15; pointer-events: none; }

        /* O BARCO (SÍMBOLO QUE SE MOVE SOBRE A CARTA) */
        #barco { 
            position: absolute; width: 18px; height: 18px; 
            background: yellow; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); 
            z-index: 100; display: none; transform: translate(-50%, -50%); 
            border: 1px solid black; box-shadow: 0 0 8px yellow;
        }

        /* PAINEL (Canto Inferior Esquerdo) */
        #painel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.9); padding: 10px; border: 2px solid red; z-index: 200; width: 180px; border-radius: 10px; }
        #dados { color: #00FF00; font-family: monospace; font-size: 13px; margin-bottom: 8px; line-height: 1.3; }
        .destaque { color: yellow; font-size: 16px; font-weight: bold; }
        
        /* BOTÕES DE MARCAÇÃO E LIGAR */
        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { font-weight: bold; border-radius: 6px; cursor: pointer; border: 1px solid white; }
        .btn-principal { background: #ff0000; color: white; grid-column: span 2; padding: 10px; font-size: 14px; }
        .btn-pt { background: #333; color: white; padding: 8px; font-size: 12px; }
        #btnLigar { background: green; color: white; width: 100%; padding: 12px; margin-bottom: 8px; font-size: 16px; border: none; }

        /* BÚSSOLA (Canto Inferior Direito) */
        #bussola { position: absolute; bottom: 10px; right: 10px; width: 70px; height: 70px; border: 2px solid white; border-radius: 50%; background: rgba(0,0,0,0.7); z-index: 200; }
        #agulha { position: absolute; top: 8px; left: 33px; width: 4px; height: 25px; background: red; transform-origin: bottom; }
        
        /* PONTOS DE PESCA */
        .ponto-marcado { position: absolute; width: 10px; height: 10px; background: red; border-radius: 50%; border: 2px solid white; z-index: 40; transform: translate(-50%, -50%); }
        .ponto-gps { position: absolute; font-size: 20px; z-index: 40; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div id="contentor-mapa">
    <svg id="svg-mapa" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid slice">
        <path d="M0,0 L1000,0 L1000,100 C950,110 920,130 900,150 C880,170 860,160 840,150 C820,140 800,130 780,120 C760,110 740,105 720,110 C700,115 680,130 660,140 C640,150 620,140 600,130 C580,120 560,100 540,90 C520,80 500,85 480,95 C460,105 440,130 420,140 C400,150 380,160 360,155 C340,150 320,130 300,120 C280,110 260,115 240,125 C220,135 200,160 180,170 C160,180 140,170 120,160 C100,150 80,145 60,150 C40,155 20,170 0,180 Z" 
              fill="#8b4513" stroke="#ffdead" stroke-width="2" />
        
        <path d="M100,250 Q150,230 200,250 T300,250" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <path d="M500,350 Q550,330 600,350 T700,350" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </svg>

    <div class="local" style="top: 175px; left: 5%;">Burgau</div>
    <div class="local" style="top: 165px; left: 22%;">Luz</div>
    <div class="local" style="top: 155px; left: 45%;">Lagos</div>
    <div class="local" style="top: 145px; left: 68%;">Alvor</div>
    <div class="local" style="top: 155px; left: 88%;">Portimão</div>

    <div id="barco"></div>
</div>

<div id="painel">
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR SISTEMA</button>
    <div id="dados">
        LAT: <span id="lat">00.00000</span><br>
        LON: <span id="lon">00.00000</span><br>
        VEL: <span id="vel" class="destaque">0.0</span> kn<br>
        DIST: <span id="dist" style="color:cyan">---</span> m
    </div>
    <div class="grid-botoes">
        <button class="btn-principal" onclick="marcar(0)">MARCA 🔴</button>
        <button class="btn-pt" onclick="marcar(1)">P1</button>
        <button class="btn-pt" onclick="marcar(2)">P2</button>
        <button class="btn-pt" onclick="marcar(3)">P3</button>
        <button class="btn-pt" onclick="marcar(4)">P4</button>
    </div>
</div>

<div id="bussola"><div id="agulha"></div></div>

<script>
    let pontosSalvos = JSON.parse(localStorage.getItem('pontosAorus')) || {};
    let posAtualPixels = { x: 0, y: 0 };

    // LIMITES CARTOGRÁFICOS DE LAGOS (Burgau -> Portimão)
    const latN = 37.135; const latS = 37.055; const lonO = -8.790; const lonE = -8.500;

    function iniciarGPS() {
        if (!navigator.geolocation) { alert("GPS não disponível."); return; }
        document.getElementById('btnLigar').style.display = 'none';
        
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const speed = pos.coords.speed ? (pos.coords.speed * 1.94384).toFixed(1) : "0.0";
            
            document.getElementById('lat').innerText = lat.toFixed(5);
            document.getElementById('lon').innerText = lon.toFixed(5);
            document.getElementById('vel').innerText = speed;

            // CONVERTE LAT/LON PARA PIXELS NO ECRÃ (O Barco move-se agora!)
            posAtualPixels.x = ((lon - lonO) / (lonE - lonO)) * window.innerWidth;
            posAtualPixels.y = ((latN - lat) / (latN - latS)) * window.innerHeight;

            const b = document.getElementById('barco');
            b.style.display = 'block';
            b.style.left = posAtualPixels.x + "px";
            b.style.top = posAtualPixels.y + "px";
            
            if (pos.coords.heading) document.getElementById('agulha').style.transform = `rotate(${pos.coords.heading}deg)`;
            atualizarDistancia();
        }, err => { alert("Erro GPS: " + err.message); }, { enableHighAccuracy: true });

        desenharPontos();
    }

    function marcar(id) {
        const b = document.getElementById('barco');
        if (b.style.display === 'none') return; // Só marca se o GPS estiver ligado
        pontosSalvos[id] = { x: b.style.left, y: b.style.top, tipo: id === 0 ? "principal" : "comum" };
        localStorage.setItem('pontosAorus', JSON.stringify(pontosSalvos));
        desenharPontos();
    }

    function desenharPontos() {
        document.querySelectorAll('.ponto-marcado, .ponto-gps').forEach(p => p.remove());
        Object.keys(pontosSalvos).forEach(id => {
            const p = pontosSalvos[id];
            let div = document.createElement('div');
            div.className = p.tipo === "principal" ? 'ponto-marcado' : 'ponto-gps';
            if (p.tipo !== "principal") div.innerText = "📍";
            div.style.left = p.x; div.style.top = p.y;
            document.getElementById('mapa').appendChild(div); // Atenção: deve ser contentor-mapa
        });
        // Correção: Adicionar ao contentor correto
        Object.keys(pontosSalvos).forEach(id => {
            const p = pontosSalvos[id];
            let div = document.createElement('div');
            div.className = p.tipo === "principal" ? 'ponto-marcado' : 'ponto-gps';
            if (p.tipo !== "principal") div.innerText = "📍";
            div.style.left = p.x; div.style.top = p.y;
            document.getElementById('contentor-mapa').appendChild(div);
        });
    }

    // Função de desenho corrigida para usar o contentor correto
    function desenharPontos() {
        document.querySelectorAll('.ponto-marcado, .ponto-gps').forEach(p => p.remove());
        Object.keys(pontosSalvos).forEach(id => {
            const p = pontosSalvos[id];
            let div = document.createElement('div');
            div.className = p.tipo === "principal" ? 'ponto-marcado' : 'ponto-gps';
            if (p.tipo !== "principal") div.innerText = "📍";
            div.style.left = p.x; div.style.top = p.y;
            document.getElementById('contentor-mapa').appendChild(div);
        });
    }

    function atualizarDistancia() {
        if (pontosSalvos[0]) {
            // Converte pixels salvos de volta para números
            let px = parseFloat(pontosSalvos[0].x);
            let py = parseFloat(pontosSalvos[0].y);
            // Distância em pixels
            let d = Math.sqrt(Math.pow(px - posAtualPixels.x, 2) + Math.pow(py - posAtualPixels.y, 2));
            // Fator de conversão aproximado pixels -> metros para esta escala de Lagos
            document.getElementById('dist').innerText = Math.round(d * 4.5); 
        }
    }
</script>
</body>
</html>

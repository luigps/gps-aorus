<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - VISTA PLANA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { touch-action: none; -webkit-user-select: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        /* QUADRADO VERDE - COMANDO DE MARCAS */
        #painel { 
            position: absolute; bottom: 20px; left: 10px; 
            background: rgba(0,20,0,0.95); padding: 15px; 
            border: 3px solid #00FF00; z-index: 1000; 
            width: 250px; border-radius: 10px; color: #00FF00;
            font-family: 'Courier New', monospace; box-shadow: 0 0 20px black;
        }
        #dados { font-size: 16px; font-weight: bold; line-height: 1.8; margin-bottom: 12px; }
        #btnLigar { 
            background: #006600; color: white; width: 100%; padding: 15px; 
            margin-bottom: 10px; border: 2px solid #00FF00; border-radius: 8px;
            font-weight: bold; font-size: 16px; cursor: pointer;
        }
        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-marca { 
            background: #1a1a1a; color: #00FF00; border: 1px solid #00FF00; 
            padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .btn-vermelho { background: #900 !important; color: white !important; grid-column: span 2; }
        #btnLixo { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 20px; color: white; cursor: pointer; }

        /* BARCO AMARELO */
        .seta-barco {
            width: 0; height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 22px solid yellow;
            filter: drop-shadow(0 0 5px black);
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="painel">
    <button id="btnLixo" onclick="apagarTudo()">🗑️</button>
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR RADAR AORUS</button>
    <div id="dados">
        LAT: <span id="txtLat">37°00.0000</span><br>
        LON: <span id="txtLon">008°00.0000</span><br>
        VEL: <span id="vel" style="color:yellow; font-size:22px;">0.0</span> kn
    </div>
    <div class="grid-botoes">
        <button class="btn-marca btn-vermelho" onclick="gravarPonto(0)">MARCA🔴 (OBJETO)</button>
        <button class="btn-marca" onclick="gravarPonto(1)">P1</button>
        <button class="btn-marca" onclick="gravarPonto(2)">P2</button>
        <button class="btn-marca" onclick="gravarPonto(3)">P3</button>
        <button class="btn-marca" onclick="gravarPonto(4)">P4</button>
    </div>
</div>

<script>
    let mapa, barco, camadaMarcas;
    let latAtual, lonAtual;
    let memoriaMarcas = JSON.parse(localStorage.getItem('marcasAorus')) || {};

    // INICIAR MAPA - BLOQUEADO EM VISTA PLANA (SEM ROTAÇÃO, SEM INCLINAÇÃO)
    mapa = L.map('map', { 
        center: [37.1000, -8.6700], 
        zoom: 14, 
        zoomControl: false, 
        attributionControl: false,
        rotate: false,           // Bloqueia rotação
        touchRotate: false,      // Bloqueia rodar com dedos
        pitch: 0,                // Bloqueia inclinação 3D
        boxZoom: false
    });

    // FOTOGRAFIA DE SATÉLITE REAL (VISTA DE CIMA)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { 
        maxZoom: 19 
    }).addTo(mapa);
    
    camadaMarcas = L.layerGroup().addTo(mapa);

    function formatar(v, isLat) {
        let a = Math.abs(v);
        let g = Math.floor(a);
        let m = ((a - g) * 60).toFixed(4);
        let p = isLat ? "" : (g < 100 ? (g < 10 ? "00" : "0") : "");
        return `${p}${g}°${m}`;
    }

    async function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        
        navigator.geolocation.watchPosition(pos => {
            latAtual = pos.coords.latitude;
            lonAtual = pos.coords.longitude;
            
            document.getElementById('txtLat').textContent = formatar(latAtual, true);
            document.getElementById('txtLon').textContent = formatar(lonAtual, false);
            document.getElementById('vel').textContent = (pos.coords.speed * 1.94384 || 0).toFixed(1);

            if (!barco) {
                let iconBarco = L.divIcon({ className: 'seta-barco', iconSize: [20, 22], iconAnchor: [10, 11] });
                barco = L.marker([latAtual, lonAtual], { icon: iconBarco }).addTo(mapa);
                mapa.setView([latAtual, lonAtual], 17);
            } else {
                barco.setLatLng([latAtual, lonAtual]);
            }
            
            let rumo = pos.coords.heading;
            if (rumo) {
                const el = document.querySelector('.seta-barco');
                if(el) el.style.transform = `rotate(${rumo}deg)`;
            }
        }, null, { enableHighAccuracy: true });
        
        desenharMarcas();
    }

    function gravarPonto(id) {
        if (!latAtual) return alert("Aguardar GPS...");
        memoriaMarcas[id] = { lat: latAtual, lon: lonAtual };
        localStorage.setItem('marcasAorus', JSON.stringify(memoriaMarcas));
        desenharMarcas();
    }

    function desenharMarcas() {
        camadaMarcas.clearLayers();
        Object.keys(memoriaMarcas).forEach(id => {
            let pt = memoriaMarcas[id];
            let label = id == 0 ? "OBJETO" : "P" + id;
            
            // BOLA VERMELHA PLANA
            L.circleMarker([pt.lat, pt.lon], {
                radius: 7, color: 'white', weight: 2, fillColor: 'red', fillOpacity: 1
            }).addTo(camadaMarcas).bindTooltip(label, { 
                permanent: true, direction: 'top', className: 'tooltip-aorus' 
            });
        });
    }

    function apagarTudo() {
        if (confirm("Apagar todos os seus recifes e marcas?")) {
            memoriaMarcas = {};
            localStorage.removeItem('marcasAorus');
            camadaMarcas.clearLayers();
        }
    }

    // AO TOCAR NA CARTA, O QUADRADO VERDE MOSTRA A COORDENADA DO LOCAL
    mapa.on('click', e => {
        document.getElementById('txtLat').textContent = formatar(e.latlng.lat, true);
        document.getElementById('txtLon').textContent = formatar(e.latlng.lng, false);
    });
</script>

<style>
    /* Estilo para o nome dos pontos no mapa */
    .tooltip-aorus { 
        background: black; color: yellow; border: 1px solid yellow; 
        font-weight: bold; font-size: 10px; padding: 2px 4px; 
    }
</style>

</body>
</html>

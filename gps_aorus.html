<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - LAGOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; padding: 0; background: black; color: red; font-family: Arial; overflow: hidden; }
        
        /* AJUSTE 1: A CARTA AGORA ENCHE TODO O ECRÃ */
        #mapa { 
            width: 100vw; 
            height: 100vh; 
            background-image: url('CartaLagos.png'); 
            background-size: cover; /* Faz a carta esticar para tapar o preto */
            background-position: center;
            position: absolute; 
            top: 0; left: 0;
            z-index: 1; /* Fica no fundo */
        }

        #painel { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.8); padding: 8px; 
            border: 1px solid red; z-index: 100; /* Salta para a frente */
        }

        /* AJUSTE 2: A BÚSSOLA SALTA PARA A FRENTE DA CARTA */
        #bussola { 
            position: absolute; bottom: 20px; right: 20px; 
            width: 70px; height: 70px; 
            border: 2px solid white; border-radius: 50%; 
            background: rgba(0,0,0,0.6); 
            z-index: 100; /* Agora fica por cima de tudo */
        }

        #agulha { 
            position: absolute; top: 5px; left: 33px; 
            width: 4px; height: 30px; 
            background: red; transform-origin: bottom; 
        }

        #btnLigar { 
            background: green; color: white; border: none; 
            padding: 10px; width: 100%; font-weight: bold; 
            margin-bottom: 5px; border-radius: 5px; 
        }
    </style>
</head>
<body>

    <div id="mapa" onclick="marcarPonto(event)">
        <div id="barco" style="position:absolute; width:15px; height:15px; background:yellow; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); display:none; z-index: 50;"></div>
    </div>

    <div id="painel">
        <button id="btnLigar" onclick="iniciarGPS()">LIGAR GPS</button>
        <div id="dados" style="font-size: 14px;">LAT: --.----<br>LON: --.----</div>
    </div>

    <div id="bussola">
        <div id="agulha"></div>
        <div id="graus" style="position:absolute; bottom:-25px; width:100%; text-align:center; color: white; font-weight:bold;">0°</div>
    </div>

    <script>
        function iniciarGPS() {
            if (navigator.geolocation) {
                document.getElementById('dados').innerHTML = "A PROCURAR...";
                navigator.geolocation.watchPosition(pos => {
                    document.getElementById('btnLigar').style.display = 'none';
                    let lat = pos.coords.latitude.toFixed(5);
                    let lon = pos.coords.longitude.toFixed(5);
                    let rumo = pos.coords.heading || 0;
                    document.getElementById('dados').innerHTML = "LAT: " + lat + "<br>LON: " + lon;
                    document.getElementById('agulha').style.transform = "rotate(" + rumo + "deg)";
                    document.getElementById('graus').innerText = Math.round(rumo) + "°";
                    document.getElementById('barco').style.display = 'block';
                }, null, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - RIGOR DE LAGOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; padding: 0; background: black; color: white; font-family: Arial; overflow: hidden; }
        #mapa { width: 100vw; height: 100vh; background-image: url('CartaLagos.png'); background-size: cover; background-position: center; position: absolute; z-index: 1; }
        
        /* CAIXA NO CANTO INFERIOR ESQUERDO */
        #painel { 
            position: absolute; bottom: 10px; left: 10px; 
            background: rgba(0,0,0,0.9); padding: 12px; 
            border: 2px solid red; z-index: 100; 
            width: 190px; border-radius: 10px; 
        }
        
        /* COORDENADAS E VELOCIDADE EM VERDE */
        #dados { color: #00FF00; font-family: monospace; font-size: 13px; margin-bottom: 10px; line-height: 1.4; }
        .destaque { color: yellow; font-size: 18px; font-weight: bold; }

        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px; font-weight: bold; border-radius: 8px; border: 1px solid white; font-size: 14px; }
        
        /* BOTÃO DA MARCA PRINCIPAL (VERMELHO) */
        .btn-principal { background: #ff0000; color: white; grid-column: span 2; font-size: 16px; }
        .btn-pt { background: #333; color: white; }
        #btnLigar { background: green; width: 100%; font-size: 18px; margin-bottom: 10px; }
        #btnLimpar { background: #111; color: #555; width: 100%; margin-top: 10px; border: none; font-size: 9px; }

        #bussola { position: absolute; bottom: 10px; right: 10px; width: 80px; height: 80px; border: 3px solid white; border-radius: 50%; background: rgba(0,0,0,0.7); z-index: 100; }
        #agulha { position: absolute; top: 10px; left: 38px; width: 4px; height: 30px; background: red; transform-origin: bottom; }
        
        #barco { position: absolute; width: 20px; height: 20px; background: yellow; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); z-index: 50; display: none; transform: translate(-50%, -50%); border: 1px solid black; }
        
        /* A MARCA AGORA É UM PONTO VERMELHO */
        .ponto-marcado { position: absolute; width: 15px; height: 15px; background: red; border-radius: 50%; border: 2px solid white; z-index: 40; transform: translate(-50%, -50%); pointer-events: none; }
        .ponto-gps { position: absolute; font-size: 24px; z-index: 40; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

<div id="mapa"><div id="barco"></div></div>

<div id="painel">
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR GPS</button>
    <div id="dados">
        LAT: <span id="lat">00.00000</span><br>
        LON: <span id="lon">00.00000</span><br>
        VEL: <span id="vel" class="destaque">0.0</span> kn<br>
        DIST: <span id="dist" style="color:cyan">---</span> m
    </div>
    <div class="grid-botoes">
        <button class="btn-principal" onclick="marcar(0)">MARCA PRINCIPAL 🔴</button>
        <button class="btn-pt" onclick="marcar(1)">P1</button>
        <button class="btn-pt" onclick="marcar(2)">P2</button>
        <button class="btn-pt" onclick="marcar(3)">P3</button>
        <button class="btn-pt" onclick="marcar(4)">P4</button>
    </div>
    <button id="btnLimpar" onclick="limpar()">LIMPAR TUDO</button>
</div>

<div id="bussola"><div id="agulha"></div></div>

<script>
    let pontosSalvos = JSON.parse(localStorage.getItem('pontosAorus')) || {};
    let posAtual = { x: 0, y: 0 };

    const latN = 37.12; const latS = 37.08; const lonO = -8.69; const lonE = -8.65;

    function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const speed = pos.coords.speed ? (pos.coords.speed * 1.94384).toFixed(1) : "0.0";
            
            document.getElementById('lat').innerText = lat.toFixed(5);
            document.getElementById('lon').innerText = lon.toFixed(5);
            document.getElementById('vel').innerText = speed;

            posAtual.x = ((lon - lonO) / (lonE - lonO)) * window.innerWidth;
            posAtual.y = ((latN - lat) / (latN - latS)) * window.innerHeight;

            const b = document.getElementById('barco');
            b.style.display = 'block';
            b.style.left = posAtual.x + "px";
            b.style.top = posAtual.y + "px";
            
            if (pos.coords.heading) document.getElementById('agulha').style.transform = `rotate(${pos.coords.heading}deg)`;
            atualizarDistancia();
        }, null, { enableHighAccuracy: true });
        desenharPontos();
    }

    function marcar(id) {
        const b = document.getElementById('barco');
        if (b.style.display === 'none') return;
        // Salva se é a Marca Principal (0) ou os outros (P1, P2...)
        pontosSalvos[id] = { x: b.style.left, y: b.style.top, tipo: id === 0 ? "principal" : "comum" };
        localStorage.setItem('pontosAorus', JSON.stringify(pontosSalvos));
        desenharPontos();
    }

    function desenharPontos() {
        document.querySelectorAll('.ponto-marcado, .ponto-gps').forEach(p => p.remove());
        Object.keys(pontosSalvos).forEach(id => {
            const p = pontosSalvos[id];
            let div = document.createElement('div');
            if (p.tipo === "principal") {
                div.className = 'ponto-marcado'; // Círculo Vermelho
            } else {
                div.className = 'ponto-gps';
                div.innerText = "📍";
            }
            div.style.left = p.x; div.style.top = p.y;
            document.getElementById('mapa').appendChild(div);
        });
    }

    function atualizarDistancia() {
        if (pontosSalvos[0]) {
            let px = parseFloat(pontosSalvos[0].x);
            let py = parseFloat(pontosSalvos[0].y);
            let d = Math.sqrt(Math.pow(px - posAtual.x, 2) + Math.pow(py - posAtual.y, 2));
            document.getElementById('dist').innerText = Math.round(d * 5); 
        }
    }

    function limpar() {
        if(confirm("Limpar marcas?")) { localStorage.removeItem('pontosAorus'); location.reload(); }
    }
</script>
</body>
</html>

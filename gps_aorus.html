<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - COMANDO TOTAL</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { touch-action: none; -webkit-user-select: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
        
        #map-container { width: 100vw; height: 100vh; perspective: 1100px; overflow: hidden; position: absolute; top: 0; left: 0; z-index: 1; }
        #map { width: 165%; height: 175%; left: -32.5%; top: -40%; position: absolute; transition: transform 0.6s ease-out; }
        .vista-3d { transform: rotateX(52deg) translateY(18%) scale(1.15); }

        #btnVista { position: absolute; top: 15px; right: 15px; z-index: 2000; background: #111; color: #00FF00; border: 2px solid #00FF00; padding: 12px; font-weight: bold; border-radius: 8px; }

        #painel { 
            position: absolute; bottom: 15px; left: 10px; 
            background: rgba(0,25,0,0.95); padding: 12px; 
            border: 3px solid #00FF00; z-index: 1000; 
            width: 270px; border-radius: 10px; color: #00FF00;
            font-family: 'Courier New', monospace;
        }
        #dados { font-size: 15px; font-weight: bold; line-height: 1.6; margin-bottom: 6px; }
        #btnLigar { background: #005500; color: white; width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid #00FF00; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .grid-marcas { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn-m { background: #1a1a1a; color: #00FF00; border: 1px solid #00FF00; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-vermelho { background: #c00 !important; color: white !important; grid-column: span 2; }
        
        /* BOTÕES DE GESTÃO */
        .btn-acao { background: #333; color: white; border: 1px solid #ccc; font-size: 10px; padding: 8px; }
        .btn-azul { background: #003366 !important; color: #00FFFF !important; border: 1px solid #00FFFF !important; }

        .seta-barco { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 26px solid yellow; }
    </style>
</head>
<body>

<button id="btnVista" onclick="alternarVista()">VISTA: CARTA 2D</button>
<input type="file" id="f_gpx" style="display:none" accept=".gpx" onchange="lerGPX(this)">

<div id="map-container"><div id="map"></div></div>

<div id="painel">
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR GPS AORUS</button>
    <div id="dados">
        LAT: <span id="txtLat">37°00.0000</span><br>
        LON: <span id="txtLon">008°00.0000</span><br>
        VEL: <span id="vel" style="color:yellow;">0.0</span> kn
    </div>
    <div class="grid-marcas">
        <button class="btn-m btn-vermelho" onclick="marcar(0)">MARCA🔴 (BARCO)</button>
        <button class="btn-m" onclick="marcar(1)">P1</button>
        <button class="btn-m" onclick="marcar(2)">P2</button>
        
        <button id="btnVisivel" class="btn-m btn-acao" onclick="toggleVisibilidade()">👁️ ESCONDER PONTOS</button>
        <button class="btn-m btn-azul" onclick="document.getElementById('f_gpx').click()">📥 IMPORTAR GPX</button>
        <button class="btn-m btn-acao" onclick="exportarGPX()">📤 EXPORTAR GPX</button>
    </div>
</div>

<script>
    let mapa, barco, camada, wakeLock = null;
    let latA, lonA, modo3D = false, mostrarPontos = true;
    let pontos = JSON.parse(localStorage.getItem('ptsAorus')) || {};

    mapa = L.map('map', { center: [37.1000, -8.6700], zoom: 14, zoomControl: false, attributionControl: false });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(mapa);
    camada = L.layerGroup().addTo(mapa);

    function toggleVisibilidade() {
        mostrarPontos = !mostrarPontos;
        document.getElementById('btnVisivel').textContent = mostrarPontos ? "👁️ ESCONDER PONTOS" : "🌑 MOSTRAR PONTOS";
        desenhar();
    }

    function lerGPX(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const parser = new DOMParser();
            const xml = parser.parseFromString(reader.result, "text/xml");
            const wpts = xml.getElementsByTagName("wpt");
            for (let i = 0; i < wpts.length; i++) {
                let lt = parseFloat(wpts[i].getAttribute("lat"));
                let ln = parseFloat(wpts[i].getAttribute("lon"));
                let id = "HIST_" + Date.now() + "_" + i; // ID para pontos históricos
                pontos[id] = { lat: lt, lon: ln, tipo: 'historico' };
            }
            localStorage.setItem('ptsAorus', JSON.stringify(pontos));
            desenhar();
            alert(wpts.length + " pontos de pesca carregados em azul!");
        };
        reader.readAsText(input.files[0]);
    }

    function exportarGPX() {
        let gpx = '<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1">';
        Object.keys(pontos).forEach(id => {
            gpx += `<wpt lat="${pontos[id].lat}" lon="${pontos[id].lon}"><name>${id}</name></wpt>`;
        });
        gpx += '</gpx>';
        const blob = new Blob([gpx], { type: 'application/gpx+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'marcas_aorus.gpx'; a.click();
    }

    function desenhar() {
        camada.clearLayers();
        if (!mostrarPontos) return;
        Object.keys(pontos).forEach(id => {
            let cor = pontos[id].tipo === 'historico' ? '#00FFFF' : 'red'; // Azul para GPX, Vermelho para o Barco
            L.circleMarker([pontos[id].lat, pontos[id].lon], {radius: 7, color: 'white', weight: 1.5, fillColor: cor, fillOpacity: 1}).addTo(camada);
        });
    }

    function alternarVista() {
        modo3D = !modo3D;
        document.getElementById('map').classList.toggle('vista-3d', modo3D);
        const b = document.getElementById('btnVista');
        b.textContent = modo3D ? "VISTA: MAR 3D" : "VISTA: CARTA 2D";
        b.style.background = modo3D ? "#00FF00" : "#111";
        b.style.color = modo3D ? "black" : "#00FF00";
    }

    function formatar(v, isLat) {
        let a = Math.abs(v); let g = Math.floor(a); let m = ((a - g) * 60).toFixed(4);
        return `${!isLat && g < 100 ? (g < 10 ? "00" : "0") : ""}${g}°${m}`;
    }

    async function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        navigator.geolocation.watchPosition(pos => {
            latA = pos.coords.latitude; lonA = pos.coords.longitude;
            document.getElementById('txtLat').textContent = formatar(latA, true);
            document.getElementById('txtLon').textContent = formatar(lonA, false);
            document.getElementById('vel').textContent = (pos.coords.speed * 1.94 || 0).toFixed(1);
            if (!barco) {
                barco = L.marker([latA, lonA], { icon: L.divIcon({className:'seta-barco', iconAnchor:[10,13]}) }).addTo(mapa);
                mapa.setView([latA, lonA], 16);
            } else { barco.setLatLng([latA, lonA]); }
        }, null, { enableHighAccuracy: true });
        desenhar();
    }

    function marcar(id) {
        if (!latA) return;
        pontos[id] = { lat: latA, lon: lonA, tipo: 'barco' };
        localStorage.setItem('ptsAorus', JSON.stringify(pontos));
        desenhar();
    }

    mapa.on('click', e => {
        document.getElementById('txtLat').textContent = formatar(e.latlng.lat, true);
        document.getElementById('txtLon').textContent = formatar(e.latlng.lng, false);
    });
</script>
</body>
</html>

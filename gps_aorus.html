<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - CARTA 6 MILHAS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; padding: 0; background: #001220; color: white; font-family: Arial; overflow: hidden; }
        #cenario { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        /* CARTA COM MOVIMENTO SUAVE */
        #mapa-real { 
            position: absolute; width: 6000px; height: 4000px; 
            transition: transform 0.6s ease-out; transform-origin: center;
        }

        #costa-svg { width: 100%; height: 100%; }

        #barco { 
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; 
            background: yellow; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); 
            z-index: 100; transform: translate(-50%, -50%); border: 2px solid black; box-shadow: 0 0 15px yellow;
        }

        #painel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.9); padding: 12px; border: 2px solid red; z-index: 200; width: 185px; border-radius: 10px; }
        #dados { color: #00FF00; font-family: monospace; font-size: 13px; margin-bottom: 8px; }
        
        .controlo-zoom { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-zoom { background: #444; color: white; flex: 1; font-size: 24px; padding: 5px; border: 1px solid white; font-weight: bold; }

        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button { font-weight: bold; border-radius: 6px; cursor: pointer; border: 1px solid white; }
        .btn-principal { background: #ff0000; color: white; grid-column: span 2; padding: 12px; font-size: 15px; }
        .btn-pt { background: #333; color: white; padding: 10px; }
        #btnLigar { background: green; color: white; width: 100%; padding: 15px; margin-bottom: 10px; font-size: 18px; border: none; }

        #bussola { position: absolute; bottom: 10px; right: 10px; width: 75px; height: 75px; border: 2px solid white; border-radius: 50%; background: rgba(0,0,0,0.7); z-index: 200; }
        #agulha { position: absolute; top: 8px; left: 35px; width: 5px; height: 30px; background: red; transform-origin: bottom; }
        
        .nome-local { fill: white; font-size: 50px; font-weight: bold; font-family: Arial; }
        .ponto-marcado { position: absolute; width: 14px; height: 14px; background: red; border-radius: 50%; border: 2px solid white; z-index: 40; transform: translate(-50%, -50%); }
        .ponto-gps { position: absolute; font-size: 30px; z-index: 40; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div id="cenario">
    <div id="mapa-real">
        <svg id="costa-svg" viewBox="0 0 6000 4000">
            <path d="M0,0 L6000,0 L6000,600 
                     C5500,650 5200,700 4800,800 
                     L4500,850 C4200,900 3800,850 3500,800 
                     L3200,750 C2800,700 2400,950 2100,1050 
                     L1800,900 C1500,850 1200,800 800,750 
                     L400,700 L0,650 Z" 
                  fill="#5c3a21" stroke="#d2b48c" stroke-width="15" />
            
            <text x="400" y="600" class="nome-local">BURGAU</text>
            <text x="1400" y="700" class="nome-local">LUZ</text>
            <text x="2500" y="850" class="nome-local">LAGOS</text>
            <text x="3800" y="750" class="nome-local">ALVOR</text>
            <text x="5200" y="750" class="nome-local">PORTIMÃO</text>

            <line x1="0" y1="2500" x2="6000" y2="2500" stroke="rgba(255,255,255,0.1)" stroke-dasharray="20,20" />
            <text x="100" y="2480" fill="rgba(255,255,255,0.3)" font-size="30">LINHA DAS 6 MILHAS</text>
        </svg>
    </div>
    <div id="barco"></div>
</div>

<div id="painel">
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR SISTEMA</button>
    <div class="controlo-zoom">
        <button class="btn-zoom" onclick="mudarZoom(0.05)">+</button>
        <button class="btn-zoom" onclick="mudarZoom(-0.05)">-</button>
    </div>
    <div id="dados">
        LAT: <span id="lat">0.0000</span><br>
        LON: <span id="lon">0.0000</span><br>
        VEL: <span id="vel" style="color:yellow; font-size:18px;">0.0</span> kn<br>
        DIST: <span id="dist" style="color:cyan">---</span> m
    </div>
    <div class="grid-botoes">
        <button class="btn-principal" onclick="marcar(0)">MARCA 🔴</button>
        <button class="btn-pt" onclick="marcar(1)">P1</button>
        <button class="btn-pt" onclick="marcar(2)">P2</button>
        <button class="btn-pt" onclick="marcar(3)">P3</button>
        <button class="btn-pt" onclick="marcar(4)">P4</button>
    </div>
</div>

<div id="bussola"><div id="agulha"></div></div>

<script>
    let pontos = JSON.parse(localStorage.getItem('pontosAorus')) || {};
    let zoom = 1.0;
    let minhaPos = { x: 2500, y: 1500 }; 

    // COORDENADAS REAIS DE COBERTURA (Burgau a Portimão + 6 Milhas para Sul)
    const latN = 37.150; // Terra adentro
    const latS = 36.950; // 6 milhas para o mar
    const lonO = -8.820; // Burgau
    const lonE = -8.480; // Portimão

    function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const speed = pos.coords.speed ? (pos.coords.speed * 1.94384).toFixed(1) : "0.0";
            
            document.getElementById('lat').innerText = lat.toFixed(4);
            document.getElementById('lon').innerText = lon.toFixed(4);
            document.getElementById('vel').innerText = speed;

            // CONVERSÃO RIGOROSA PARA O MAPA DE 6000px
            minhaPos.x = ((lon - lonO) / (lonE - lonO)) * 6000;
            minhaPos.y = ((latN - lat) / (latN - latS)) * 4000;

            atualizarCena();
            if (pos.coords.heading) document.getElementById('agulha').style.transform = `rotate(${pos.coords.heading}deg)`;
            calcDist();
        }, null, { enableHighAccuracy: true });
        desenhar();
    }

    function mudarZoom(v) { 
        zoom += v; 
        if(zoom < 0.15) zoom = 0.15; 
        if(zoom > 6.0) zoom = 6.0; 
        atualizarCena(); 
    }

    function atualizarCena() {
        const dX = (window.innerWidth / 2) - (minhaPos.x * zoom);
        const dY = (window.innerHeight / 2) - (minhaPos.y * zoom);
        document.getElementById('mapa-real').style.transform = `translate(${dX}px, ${dY}px) scale(${zoom})`;
    }

    function marcar(id) {
        pontos[id] = { x: minhaPos.x, y: minhaPos.y, t: id === 0 ? "principal" : "comum" };
        localStorage.setItem('pontosAorus', JSON.stringify(pontos));
        desenhar();
    }

    function desenhar() {
        document.querySelectorAll('.ponto-marcado, .ponto-gps').forEach(p => p.remove());
        Object.keys(pontos).forEach(id => {
            const p = pontos[id];
            let div = document.createElement('div');
            div.className = p.t === "principal" ? 'ponto-marcado' : 'ponto-gps';
            if (p.t !== "principal") div.innerText = "📍";
            div.style.left = p.x + "px"; div.style.top = p.y + "px";
            document.getElementById('mapa-real').appendChild(div);
        });
    }

    function calcDist() {
        if (pontos[0]) {
            let d = Math.sqrt(Math.pow(pontos[0].x - minhaPos.x, 2) + Math.pow(pontos[0].y - minhaPos.y, 2));
            // Escala para metros real na zona de Lagos
            document.getElementById('dist').innerText = Math.round(d * 3.8); 
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - ZOOM E RIGOR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        body { margin: 0; padding: 0; background: #001f3f; color: white; font-family: Arial; overflow: hidden; }
        #contentor-mapa { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        /* O MAPA QUE MUDA DE TAMANHO (ZOOM) */
        #mapa { 
            width: 3000px; height: 1500px; position: absolute; z-index: 1; 
            transition: transform 0.3s ease-out; transform-origin: center;
        }
        
        #costa { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-top: 15px solid #8b4513; border-radius: 50px 50px 0 0; }
        .local { position: absolute; color: white; font-weight: bold; font-size: 20px; text-shadow: 2px 2px 2px black; transform: translate(-50%, -100%); }

        #barco { 
            position: absolute; top: 50%; left: 50%; width: 22px; height: 22px; 
            background: yellow; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); 
            z-index: 100; transform: translate(-50%, -50%); border: 1px solid black; 
        }

        /* PAINEL NO CANTO INFERIOR ESQUERDO */
        #painel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.9); padding: 10px; border: 2px solid red; z-index: 200; width: 180px; border-radius: 10px; }
        #dados { color: #00FF00; font-family: monospace; font-size: 13px; margin-bottom: 8px; }
        
        /* BOTÕES DE ZOOM (+ e -) */
        .controlo-zoom { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-zoom { background: #444; color: white; flex: 1; font-size: 20px; padding: 5px; border: 1px solid white; }

        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-principal { background: #ff0000; color: white; grid-column: span 2; padding: 12px; }
        .btn-pt { background: #333; color: white; padding: 10px; }
        #btnLigar { background: green; color: white; width: 100%; padding: 15px; margin-bottom: 10px; font-size: 16px; }

        #bussola { position: absolute; bottom: 10px; right: 10px; width: 70px; height: 70px; border: 2px solid white; border-radius: 50%; background: rgba(0,0,0,0.7); z-index: 200; }
        #agulha { position: absolute; top: 8px; left: 33px; width: 4px; height: 25px; background: red; transform-origin: bottom; }
        
        .ponto-marcado { position: absolute; width: 12px; height: 12px; background: red; border-radius: 50%; border: 2px solid white; z-index: 40; transform: translate(-50%, -50%); }
        .ponto-gps { position: absolute; font-size: 24px; z-index: 40; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div id="contentor-mapa">
    <div id="mapa">
        <div id="costa"></div>
        <div class="local" style="top: 20px; left: 10%;">Burgau</div>
        <div class="local" style="top: 30px; left: 25%;">Luz</div>
        <div class="local" style="top: 5px; left: 50%;">Lagos</div>
        <div class="local" style="top: 15px; left: 70%;">Alvor (Barra)</div>
        <div class="local" style="top: 35px; left: 90%;">Portimão</div>
    </div>
    <div id="barco"></div>
</div>

<div id="painel">
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR SISTEMA</button>
    
    <div class="controlo-zoom">
        <button class="btn-zoom" onclick="ajustarZoom(0.2)">+</button>
        <button class="btn-zoom" onclick="ajustarZoom(-0.2)">-</button>
    </div>

    <div id="dados">
        LAT: <span id="lat">00.00000</span><br>
        LON: <span id="lon">00.00000</span><br>
        VEL: <span id="vel" style="color:yellow; font-size:16px; font-weight:bold;">0.0</span> kn<br>
        DIST: <span id="dist" style="color:cyan">---</span> m
    </div>
    <div class="grid-botoes">
        <button class="btn-principal" onclick="marcar(0)">MARCA 🔴</button>
        <button class="btn-pt" onclick="marcar(1)">P1</button>
        <button class="btn-pt" onclick="marcar(2)">P2</button>
        <button class="btn-pt" onclick="marcar(3)">P3</button>
        <button class="btn-pt" onclick="marcar(4)">P4</button>
    </div>
</div>

<div id="bussola"><div id="agulha"></div></div>

<script>
    let pontosSalvos = JSON.parse(localStorage.getItem('pontosAorus')) || {};
    let posNoMapa = { x: 1500, y: 750 };
    let zoomAtual = 1.0;

    const latN = 37.130; const latS = 37.060; const lonO = -8.780; const lonE = -8.500;

    function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const speed = pos.coords.speed ? (pos.coords.speed * 1.94384).toFixed(1) : "0.0";
            
            document.getElementById('lat').innerText = lat.toFixed(5);
            document.getElementById('lon').innerText = lon.toFixed(5);
            document.getElementById('vel').innerText = speed;

            posNoMapa.x = ((lon - lonO) / (lonE - lonO)) * 3000;
            posNoMapa.y = ((latN - lat) / (latN - latS)) * 1500;

            atualizarPosicao();
            
            if (pos.coords.heading) document.getElementById('agulha').style.transform = `rotate(${pos.coords.heading}deg)`;
            atualizarDistancia();
        }, null, { enableHighAccuracy: true });
        desenharPontos();
    }

    function ajustarZoom(valor) {
        zoomAtual += valor;
        if (zoomAtual < 0.4) zoomAtual = 0.4;
        if (zoomAtual > 3.0) zoomAtual = 3.0;
        atualizarPosicao();
    }

    function atualizarPosicao() {
        const dX = (window.innerWidth / 2) - (posNoMapa.x * zoomAtual);
        const dY = (window.innerHeight / 2) - (posNoMapa.y * zoomAtual);
        const m = document.getElementById('mapa');
        m.style.transform = `translate(${dX}px, ${dY}px) scale(${zoomAtual})`;
    }

    function marcar(id) {
        if (document.getElementById('barco').style.display === 'none') return;
        pontosSalvos[id] = { x: posNoMapa.x, y: posNoMapa.y, tipo: id === 0 ? "principal" : "comum" };
        localStorage.setItem('pontosAorus', JSON.stringify(pontosSalvos));
        desenharPontos();
    }

    function desenharPontos() {
        document.querySelectorAll('.ponto-marcado, .ponto-gps').forEach(p => p.remove());
        Object.keys(pontosSalvos).forEach(id => {
            const p = pontosSalvos[id];
            let div = document.createElement('div');
            div.className = p.tipo === "principal" ? 'ponto-marcado' : 'ponto-gps';
            if (p.tipo !== "principal") div.innerText = "📍";
            div.style.left = p.x + "px"; div.style.top = p.y + "px";
            document.getElementById('mapa').appendChild(div);
        });
    }

    function atualizarDistancia() {
        if (pontosSalvos[0]) {
            let d = Math.sqrt(Math.pow(pontosSalvos[0].x - posNoMapa.x, 2) + Math.pow(pontosSalvos[0].y - posNoMapa.y, 2));
            document.getElementById('dist').innerText = Math.round(d * 8); 
        }
    }
</script>
</body>
</html>

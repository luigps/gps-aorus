<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS AORUS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .painel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="painel">
        <button onclick="ligarGps()">⚡ LIGAR GPS AORUS</button>
        <div id="coords" style="font-size: 10px;">LAT: 0 | LON: 0</div>
    </div>

    <div id="map"></div>

    <script>
        // CONFIGURAÇÕES ORIGINAIS DE x64 E BIBLIOTECAS (MANTIDAS)
        var map = L.map('map').setView([37.102, -8.673], 14);
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Satélite Aorus'
        }).addTo(map);

        var marker = L.circleMarker([0, 0], {radius: 8, color: 'blue'}).addTo(map);

        // --- A ALTERAÇÃO DE RIGOR PARA O GPS ---
        function ligarGps() {
            if (navigator.geolocation) {
                // watchPosition força o GPS a ficar ligado mesmo que arrastes o mapa
                navigator.geolocation.watchPosition(function(pos) {
                    var lat = pos.coords.latitude;
                    var lon = pos.coords.longitude;

                    document.getElementById('coords').innerHTML = "LAT: " + lat.toFixed(6) + " | LON: " + lon.toFixed(6);
                    marker.setLatLng([lat, lon]);
                    
                    // Só centraliza se tu não estiveres a arrastar
                    // map.setView([lat, lon]); 
                }, 
                function(erro) { console.log(erro); }, 
                { 
                    enableHighAccuracy: true, // ALTA PRECISÃO (SINAL DE SATÉLITE)
                    maximumAge: 0, 
                    timeout: 10000 
                });
            }
        }
    </script>
</body>
</html>

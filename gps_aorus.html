<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - RIGOR TOTAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        * { touch-action: none; -webkit-user-select: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000a15; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        #cenario { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        /* Mapa de alta escala para precisão */
        #mapa-real { 
            position: absolute; width: 18000px; height: 6000px; 
            transform-origin: 0 0; z-index: 1; 
        }

        #costa-svg { width: 100%; height: 100%; }
        #barco { 
            position: absolute; width: 28px; height: 28px; background: yellow; 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); z-index: 100; 
            display: none; transform: translate(-50%, -50%); border: 2px solid black; 
        }
        
        /* PAINEL DE DADOS - QUADRADO VERDE */
        #painel { 
            position: absolute; bottom: 20px; left: 20px; background: rgba(0,20,0,0.95); 
            padding: 15px; border: 3px solid #00FF00; z-index: 200; width: 230px; border-radius: 10px; 
        }
        
        #dados { color: #00FF00; font-family: 'Courier New', monospace; font-size: 15px; font-weight: bold; line-height: 1.8; }
        #btnLigar { background: #008800; color: white; width: 100%; padding: 18px; margin-bottom: 12px; font-size: 16px; border: 2px solid #00FF00; border-radius: 8px; cursor: pointer; }
        
        .nome-local { fill: white; font-size: 70px; font-weight: bold; text-shadow: 4px 4px black; }
        .marca-vermelha { position: absolute; width: 20px; height: 20px; background: red; border-radius: 50%; border: 2px solid white; transform: translate(-50%, -50%); z-index: 50; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="cenario">
    <div id="mapa-real">
        <svg id="costa-svg" viewBox="0 0 18000 6000">
            <path d="M0,0 L18000,0 L18000,1200 
                     L16000,1300 L13000,1450 L10500,1400 L8000,1300 
                     L6500,1250 L5000,1200 L4000,1350 L3100,1700 
                     L2700,1900 L2400,1750 L1100,1650 L0,1700 Z" 
                  fill="#4d3319" stroke="#d2b48c" stroke-width="30" />
            
            <text x="500" y="1500" class="nome-local">SAGRES</text>
            <text x="1300" y="1550" class="nome-local">BURGAU</text>
            <text x="2000" y="1650" class="nome-local">LUZ</text>
            <text x="2500" y="1700" class="nome-local">P.MÓS</text>
            <text x="2900" y="1800" class="nome-local">LAGOS (BARRA)</text>
            <text x="5200" y="1100" class="nome-local">PORTIMÃO</text>
            <text x="14000" y="1100" class="nome-local">VRSA</text>
        </svg>
        <div id="barco"></div>
    </div>
</div>

<div id="painel">
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR SISTEMA AORUS</button>
    <div id="dados">
        LAT: <span id="txtLat">---</span><br>
        LON: <span id="txtLon">---</span><br>
        VEL: <span id="vel" style="color:yellow; font-size:22px;">0.0</span> kn<br>
        RUMO: <span id="rumo" style="color:cyan;">000</span>°
    </div>
    <button style="width:100%; background:red; color:white; border:none; padding:12px; margin-top:12px; font-weight:bold; border-radius:6px;" onclick="marcar()">MARCAR 🔴</button>
</div>

<script>
    let zoom = 0.25, mapX = 0, mapY = 0;
    let barcoPos = { x: 2900, y: 2500 };
    let evCache = []; let prevDiff = -1;
    let lastX, lastY;

    // BALIZAS CALIBRADAS
    const lonO = -9.0000, lonE = -7.3000, latN = 37.3500, latS = 36.6000;

    function formatarCoord(valor, isLat) {
        let absV = Math.abs(valor);
        let g = Math.floor(absV);
        let m = ((absV - g) * 60).toFixed(4);
        let p = isLat ? "" : (g < 100 ? (g < 10 ? "00" : "0") : "");
        return `${p}${g}° ${m}'`;
    }

    async function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');

        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // ATUALIZAÇÃO DO PAINEL
            document.getElementById('txtLat').textContent = formatarCoord(lat, true);
            document.getElementById('txtLon').textContent = formatarCoord(lon, false);
            document.getElementById('vel').textContent = (pos.coords.speed * 1.94 || 0).toFixed(1);
            document.getElementById('rumo').textContent = Math.round(pos.coords.heading || 0).toString().padStart(3, '0');

            // CÁLCULO DO BARCO NO MAPA
            barcoPos.x = ((lon - lonO) / (lonE - lonO)) * 18000;
            barcoPos.y = ((latN - lat) / (latN - latS)) * 6000;

            const b = document.getElementById('barco');
            b.style.display = 'block'; b.style.left = barcoPos.x + "px"; b.style.top = barcoPos.y + "px";
        }, null, { enableHighAccuracy: true });
        
        centrarNoBarco();
    }

    const cenario = document.getElementById('cenario');
    const mapa = document.getElementById('mapa-real');

    // NAVEGAÇÃO NA CARTA (FLEXÍVEL)
    cenario.onpointerdown = e => { lastX = e.clientX; lastY = e.clientY; evCache.push(e); };
    
    cenario.onpointermove = e => {
        const index = evCache.findIndex(s => s.pointerId === e.pointerId);
        evCache[index] = e;

        if (evCache.length === 2) { // Zoom suave
            const curDiff = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            if (prevDiff > 0) {
                let fator = curDiff > prevDiff ? 1.015 : 0.985;
                let oldZ = zoom; zoom *= fator;
                if(zoom < 0.05) zoom = 0.05; if(zoom > 8) zoom = 8;
                let midX = (evCache[0].clientX + evCache[1].clientX) / 2;
                let midY = (evCache[0].clientY + evCache[1].clientY) / 2;
                mapX = midX - (midX - mapX) * zoom / oldZ;
                mapY = midY - (midY - mapY) * zoom / oldZ;
            }
            prevDiff = curDiff;
        } else if (evCache.length === 1) { // Arrasto
            if (lastX) { mapX += e.clientX - lastX; mapY += e.clientY - lastY; }
            lastX = e.clientX; lastY = e.clientY;
        }
        mapa.style.transform = `translate(${mapX}px, ${mapY}px) scale(${zoom})`;
    };

    cenario.onpointerup = e => { evCache = evCache.filter(p => p.pointerId !== e.pointerId); lastX = null; prevDiff = -1; };

    function centrarNoBarco() {
        mapX = (window.innerWidth / 2) - (barcoPos.x * zoom);
        mapY = (window.innerHeight / 2) - (barcoPos.y * zoom);
        mapa.style.transform = `translate(${mapX}px, ${mapY}px) scale(${zoom})`;
    }

    function marcar() {
        let d = document.createElement('div');
        d.className = 'marca-vermelha';
        d.style.left = barcoPos.x + "px"; d.style.top = barcoPos.y + "px";
        mapa.appendChild(d);
    }
</script>
</body>
</html>

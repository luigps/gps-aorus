<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - NAVEGAÇÃO TOTAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { touch-action: none; -webkit-user-select: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
        
        /* CONTENTOR DE PROFUNDIDADE */
        #map-container { 
            width: 100vw; height: 100vh; 
            perspective: 1000px; 
            overflow: hidden;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        
        /* MAPA COM SOBRA PARA COBRIR TUDO POR BAIXO DO PAINEL */
        #map { 
            width: 180%; height: 180%; 
            left: -40%; top: -30%;
            position: absolute;
            transition: transform 0.6s ease-out; 
        }
        
        /* VISTA 3D - PASSA POR BAIXO DO QUADRADO VERDE */
        .vista-3d { 
            transform: rotateX(52deg) scale(1.1) translateY(15%);
        }

        /* BOTÃO DE VISTA NO TOPO */
        #btnVista { 
            position: absolute; top: 15px; right: 15px; z-index: 2000;
            background: #111; color: #00FF00; border: 2px solid #00FF00;
            padding: 12px; font-weight: bold; border-radius: 8px;
        }

        /* QUADRADO VERDE - PAINEL FLUTUANTE */
        #painel { 
            position: absolute; bottom: 20px; left: 10px; 
            background: rgba(0,25,0,0.92); padding: 15px; 
            border: 3px solid #00FF00; z-index: 1000; 
            width: 250px; border-radius: 10px; color: #00FF00;
            font-family: 'Courier New', monospace; box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
        }
        #dados { font-size: 16px; font-weight: bold; line-height: 1.7; margin-bottom: 8px; }
        #btnLigar { background: #004400; color: white; width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #00FF00; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .grid-marcas { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn-m { background: #1a1a1a; color: #00FF00; border: 1px solid #00FF00; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-vermelho { background: #b00 !important; color: white !important; grid-column: span 2; }

        .seta-barco {
            width: 0; height: 0; 
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 25px solid yellow;
        }
    </style>
</head>
<body>

<button id="btnVista" onclick="alternarVista()">VISTA: CARTA 2D</button>

<div id="map-container">
    <div id="map"></div>
</div>

<div id="painel">
    <button id="btnLigar" onclick="iniciarGPS()">LIGAR GPS AORUS</button>
    <div id="dados">
        LAT: <span id="txtLat">37°00.0000</span><br>
        LON: <span id="txtLon">008°00.0000</span><br>
        VEL: <span id="vel" style="color:yellow;">0.0</span> kn
    </div>
    <div class="grid-marcas">
        <button class="btn-m btn-vermelho" onclick="marcar(0)">MARCA🔴 (RECIFE)</button>
        <button class="btn-m" onclick="marcar(1)">P1</button>
        <button class="btn-m" onclick="marcar(2)">P2</button>
        <button class="btn-m" onclick="marcar(3)">P3</button>
        <button class="btn-m" onclick="marcar(4)">P4</button>
    </div>
</div>

<script>
    let mapa, barco, camada;
    let latA, lonA, modo3D = false;
    let pontos = JSON.parse(localStorage.getItem('ptsAorus')) || {};

    mapa = L.map('map', { center: [37.1000, -8.6700], zoom: 15, zoomControl: false, attributionControl: false });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(mapa);
    camada = L.layerGroup().addTo(mapa);

    function alternarVista() {
        modo3D = !modo3D;
        const m = document.getElementById('map');
        const b = document.getElementById('btnVista');
        if(modo3D) { 
            m.classList.add('vista-3d'); b.textContent = "VISTA: MAR 3D"; 
            b.style.background = "#00FF00"; b.style.color = "black";
        } else { 
            m.classList.remove('vista-3d'); b.textContent = "VISTA: CARTA 2D"; 
            b.style.background = "#111"; b.style.color = "#00FF00";
        }
    }

    function formatar(v, isLat) {
        let a = Math.abs(v); let g = Math.floor(a); let m = ((a - g) * 60).toFixed(4);
        let p = isLat ? "" : (g < 100 ? (g < 10 ? "00" : "0") : "");
        return `${p}${g}°${m}`;
    }

    async function iniciarGPS() {
        document.getElementById('btnLigar').style.display = 'none';
        navigator.geolocation.watchPosition(pos => {
            latA = pos.coords.latitude; lonA = pos.coords.longitude;
            document.getElementById('txtLat').textContent = formatar(latA, true);
            document.getElementById('txtLon').textContent = formatar(lonA, false);
            document.getElementById('vel').textContent = (pos.coords.speed * 1.94 || 0).toFixed(1);
            if (!barco) {
                barco = L.marker([latA, lonA], { icon: L.divIcon({className:'seta-barco', iconAnchor:[10,12]}) }).addTo(mapa);
                mapa.setView([latA, lonA], 17);
            } else { barco.setLatLng([latA, lonA]); }
        }, null, { enableHighAccuracy: true });
        desenhar();
    }

    function marcar(id) {
        if (!latA) return;
        pontos[id] = { lat: latA, lon: lonA };
        localStorage.setItem('ptsAorus', JSON.stringify(pontos));
        desenhar();
    }

    function desenhar() {
        camada.clearLayers();
        Object.keys(pontos).forEach(id => {
            L.circleMarker([pontos[id].lat, pontos[id].lon], {radius: 7, color: 'white', weight: 2, fillColor: 'red', fillOpacity: 1}).addTo(camada);
        });
    }

    mapa.on('click', e => {
        document.getElementById('txtLat').textContent = formatar(e.latlng.lat, true);
        document.getElementById('txtLon').textContent = formatar(e.latlng.lng, false);
    });
</script>
</body>
</html>

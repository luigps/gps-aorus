<!DOCTYPE html>
<html>
<head>
    <title>GPS AORUS - EXPORT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; background: #000; color: #0f0; font-family: monospace; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; }
        /* BARRA AZUL PARA CONFIRMAR ATUALIZAÇÃO */
        #topo-verificacao { position: absolute; top: 0; width: 100%; background: #001133; color: #8af; font-size: 10px; text-align: center; z-index: 5000; padding: 2px; border-bottom: 1px solid #8af; }
        #painel { position: absolute; bottom: 10px; left: 10px; z-index: 1000; background: rgba(0,20,0,0.95); border: 2px solid #0f0; border-radius: 10px; padding: 12px; width: 280px; }
        #gaveta { position: absolute; bottom: 0; left: 0; z-index: 3000; width: 100%; background: #000; border-top: 2px solid #0f0; padding: 20px; transform: translateY(100%); transition: 0.3s; border-radius: 15px 15px 0 0; }
        #gaveta.aberta { transform: translateY(0); }
        .btn { background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-bottom: 8px; cursor: pointer; }
        #alerta-visual { display:none; position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: #f00; color: #fff; padding: 20px; border-radius: 20px; z-index: 9999; border: 5px solid #fff; text-align: center; width: 80%; font-size: 22px; }
    </style>
</head>
<body>
    <div id="topo-verificacao">VERSÃO COM EXPORTAR (AZUL)</div>
    <div id="alerta-visual">🚨 ALVO A <span id="d-txt"></span>m 🚨</div>
    <div id="map"></div>
    <div id="painel">
        <button id="btnLigar" class="btn" style="background:#004400;" onclick="iniciar()">⚡ LIGAR GPS AORUS</button>
        <div id="coords" style="font-size: 15px; margin: 5px 0;">LAT: ---<br>LON: ---</div>
        <div style="border: 1px dashed #0f0; text-align: center; font-size: 11px; padding: 4px;">100 METROS FIXO</div>
        <button class="btn" onclick="document.getElementById('gaveta').classList.add('aberta')">▲ MENU / MARCAS</button>
    </div>
    <div id="gaveta">
        <button class="btn" style="background:#600; color:#fff;" onclick="marcar()">🔴 MARCAR POSIÇÃO</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="document.getElementById('f_gpx').click()">📥 IMPORTAR</button>
            <button class="btn" style="background:#002244; color:#8af; border-color:#8af;" onclick="exportarGPX()">📤 EXPORTAR</button>
            <button class="btn" onclick="apagarTudo()" style="color:#f66;">🗑️ APAGAR</button>
            <button class="btn" onclick="document.getElementById('gaveta').classList.remove('aberta')">✖ FECHAR</button>
        </div>
        <input type="file" id="f_gpx" style="display:none" onchange="lerGPX(this)">
    </div>
    <script>
        let mapa, barco, camada, la, lo, pts = {};
        try { pts = JSON.parse(localStorage.getItem('pts_aorus')) || {}; } catch(e) {}
        mapa = L.map('map', { center: [37.1, -8.67], zoom: 15, zoomControl: false, attributionControl: false });
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(mapa);
        camada = L.layerGroup().addTo(mapa);
        function desenhar() {
            camada.clearLayers();
            Object.values(pts).forEach(p => L.marker([p.lat, p.lon], { icon: L.divIcon({ html: `<div style="font-size:24px;">${p.s}</div>`, className: '' }) }).addTo(camada));
        }
        function marcar() { if(!la) return; pts['P'+Date.now()] = { lat: la, lon: lo, s: '🔴' }; localStorage.setItem('pts_aorus', JSON.stringify(pts)); desenhar(); document.getElementById('gaveta').classList.remove('aberta'); }
        function iniciar() {
            document.getElementById('btnLigar').style.display = 'none';
            navigator.geolocation.watchPosition(pos => {
                la = pos.coords.latitude; lo = pos.coords.longitude;
                document.getElementById('coords').innerHTML = `LAT: ${la.toFixed(5)}<br>LON: ${lo.toFixed(5)}`;
                let menor = Infinity; Object.values(pts).forEach(p => { let d = mapa.distance([la, lo], [p.lat, p.lon]); if(d < menor) menor = d; });
                document.getElementById('alerta-visual').style.display = menor <= 100 ? 'block' : 'none';
                document.getElementById('d-txt').textContent = Math.round(menor);
                if(!barco) { barco = L.marker([la, lo]).addTo(mapa); mapa.setView([la, lo], 17); } else { barco.setLatLng([la, lo]); }
                mapa.panTo([la, lo]);
            }, null, { enableHighAccuracy: true });
            desenhar();
        }
        function exportarGPX() {
            let gpx = '<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1">';
            Object.values(pts).forEach(p => { gpx += `<wpt lat="${p.lat}" lon="${p.lon}"><name>Marca</name></wpt>`; });
            gpx += '</gpx>';
            let link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([gpx], {type: 'text/xml'})); link.download = 'marcas_aorus.gpx'; link.click();
        }
        function lerGPX(i) {
            let r = new FileReader(); r.onload = (e) => {
                let x = new DOMParser().parseFromString(e.target.result, "text/xml");
                let w = x.getElementsByTagName('wpt');
                for(let j=0; j<w.length; j++) pts['I'+Date.now()+j] = { lat: parseFloat(w[j].getAttribute('lat')), lon: parseFloat(w[j].getAttribute('lon')), s: '📍' };
                localStorage.setItem('pts_aorus', JSON.stringify(pts)); desenhar(); alert("GPX OK!");
            }; r.readAsText(i.files[0]);
        }
        function apagarTudo() { if(confirm("Apagar tudo?")) { pts = {}; localStorage.setItem('pts_aorus', "{}"); desenhar(); } }
    </script>
</body>
</html>
